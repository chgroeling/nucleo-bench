name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & size delta
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install arm-none-eabi toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.2.Rel1'

      - name: Show toolchain versions
        run: |
          arm-none-eabi-gcc --version | head -n1
          arm-none-eabi-g++ --version | head -n1
          make --version | head -n1

      - name: Build empty baseline (make release)
        run: make release

      - name: Record baseline size
        run: |
          mkdir -p dist/baseline
          cp build/firmware.elf build/firmware.bin build/firmware.map dist/baseline/
          arm-none-eabi-size build/firmware.elf | tee baseline-size.txt

      - name: Build nop example (make release ALGO=nop)
        run: make release ALGO=nop

      - name: Record ALGO=nop size
        run: |
          mkdir -p dist/algo_nop
          cp build/firmware.elf build/firmware.bin build/firmware.map dist/algo_nop/
          arm-none-eabi-size build/firmware.elf | tee algo-nop-size.txt

      - name: Build sprintf example (make release ALGO=sprintf)
        run: make release ALGO=sprintf

      - name: Record ALGO=sprintf size
        run: |
          mkdir -p dist/algo_sprintf
          cp build/firmware.elf build/firmware.bin build/firmware.map dist/algo_sprintf/
          arm-none-eabi-size build/firmware.elf | tee algo-sprintf-size.txt

      - name: Size delta & summary
        run: |
          read base_text base_data base_bss <<<"$(awk 'NR==2 {print $1, $2, $3}' baseline-size.txt)"
          read nop_text nop_data nop_bss <<<"$(awk 'NR==2 {print $1, $2, $3}' algo-nop-size.txt)"
          read spf_text spf_data spf_bss <<<"$(awk 'NR==2 {print $1, $2, $3}' algo-sprintf-size.txt)"

          signed() { [ "$1" -ge 0 ] && printf '+%d' "$1" || printf '%d' "$1"; }

          nop_total=$(( (nop_text + nop_data + nop_bss) - (base_text + base_data + base_bss) ))
          spf_total=$(( (spf_text + spf_data + spf_bss) - (base_text + base_data + base_bss) ))

          {
            echo "## Firmware size delta"
            echo ""
            echo "Footprint of the bundled examples vs. the empty baseline"
            echo "(\`make release ALGO=<name>\` − \`make release\`)."
            echo ""
            echo "| Section | Baseline | ALGO=nop | Delta | ALGO=sprintf | Delta |"
            echo "|---------|---------:|---------:|------:|-------------:|------:|"
            echo "| text    | ${base_text} | ${nop_text} | $(signed $((nop_text - base_text))) | ${spf_text} | $(signed $((spf_text - base_text))) |"
            echo "| data    | ${base_data} | ${nop_data} | $(signed $((nop_data - base_data))) | ${spf_data} | $(signed $((spf_data - base_data))) |"
            echo "| bss     | ${base_bss} | ${nop_bss} | $(signed $((nop_bss - base_bss))) | ${spf_bss} | $(signed $((spf_bss - base_bss))) |"
            echo ""
            echo "Total footprint (text + data + bss delta): nop **$(signed "$nop_total") bytes**, sprintf **$(signed "$spf_total") bytes**"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "nop: text delta = $((nop_text - base_text)) bytes, total delta = ${nop_total} bytes"
          echo "sprintf: text delta = $((spf_text - base_text)) bytes, total delta = ${spf_total} bytes"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: dist/
