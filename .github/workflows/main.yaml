name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build & size delta
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install arm-none-eabi toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.2.Rel1'

      - name: Show toolchain versions
        run: |
          arm-none-eabi-gcc --version | head -n1
          arm-none-eabi-g++ --version | head -n1
          make --version | head -n1

      - name: Build empty baseline (make release)
        run: make release

      - name: Record baseline size
        run: |
          mkdir -p dist/baseline
          cp build/firmware.elf build/firmware.bin build/firmware.map dist/baseline/
          arm-none-eabi-size build/firmware.elf | tee baseline-size.txt

      - name: Build nop example (make release TEST_ALGO=1)
        run: make release TEST_ALGO=1

      - name: Record TEST_ALGO size
        run: |
          mkdir -p dist/test_algo
          cp build/firmware.elf build/firmware.bin build/firmware.map dist/test_algo/
          arm-none-eabi-size build/firmware.elf | tee test-algo-size.txt

      - name: Size delta & summary
        run: |
          read base_text base_data base_bss <<<"$(awk 'NR==2 {print $1, $2, $3}' baseline-size.txt)"
          read algo_text algo_data algo_bss <<<"$(awk 'NR==2 {print $1, $2, $3}' test-algo-size.txt)"

          signed() { [ "$1" -ge 0 ] && printf '+%d' "$1" || printf '%d' "$1"; }

          d_text=$((algo_text - base_text))
          d_data=$((algo_data - base_data))
          d_bss=$((algo_bss - base_bss))

          {
            echo "## Firmware size delta"
            echo ""
            echo "Footprint of the bundled nop example vs. the empty baseline"
            echo "(\`make release TEST_ALGO=1\` − \`make release\`)."
            echo ""
            echo "| Section | Baseline | TEST_ALGO | Delta |"
            echo "|---------|---------:|----------:|------:|"
            echo "| text    | ${base_text} | ${algo_text} | $(signed "$d_text") |"
            echo "| data    | ${base_data} | ${algo_data} | $(signed "$d_data") |"
            echo "| bss     | ${base_bss} | ${algo_bss} | $(signed "$d_bss") |"
            echo ""
            echo "Code footprint (text delta): **$(signed "$d_text") bytes**"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "text delta = ${d_text} bytes, data delta = ${d_data} bytes, bss delta = ${d_bss} bytes"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v7
        with:
          name: firmware
          path: dist/
